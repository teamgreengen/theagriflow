name: Landing Standalone CI
on:
  push:
    branches: [ main ]
    paths:
      - 'landing-standalone/**'
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install
        run: npm ci
        working-directory: landing-standalone
      - name: Build
        run: npm run build
        working-directory: landing-standalone
      - name: Deploy to Vercel (Landing)
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.LANDING_VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.LANDING_VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.LANDING_VERCEL_PROJECT_ID }}
          vercel-args: --prod
        working-directory: landing-standalone
